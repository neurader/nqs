name: Build & Release NQS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi

          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -ldflags="-X main.version=${{ github.ref_name }}" \
          -o dist/nqs-${{ matrix.os }}-${{ matrix.arch }}$EXT ./cmd/nqs

      - name: Compress binaries (tar.gz)
        run: |
          cd dist
          for file in *; do
            tar -czf "$file.tar.gz" "$file"
          done

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
